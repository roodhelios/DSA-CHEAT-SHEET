    <div class="code-block"><code><span class="var">t</span> = (<span class="num">1</span>, <span class="num">2</span>)
<span class="var">t</span>[<span class="num">0</span>]           <span class="cm"># 1 — can read</span>
<span class="var">t</span>[<span class="num">0</span>] = <span class="num">5</span>       <span class="cm"># ❌ TypeError — immutable</span>

<span class="cm"># USE CASE: tuple as hashmap key</span>
<span class="var">d</span> = {}
<span class="var">d</span>[(<span class="num">1</span>, <span class="num">2</span>)] = <span class="str">"point"</span>   <span class="cm"># ✅ tuple is hashable</span>

<span class="var">s</span> = {(<span class="num">0</span>,<span class="num">0</span>), (<span class="num">1</span>,<span class="num">1</span>)}     <span class="cm"># ✅ set of tuples (e.g. visited grid cells)</span>

<span class="cm"># List key → FAILS</span>
<span class="var">d</span>[[<span class="num">1</span>,<span class="num">2</span>]] = <span class="str">"x"</span>         <span class="cm"># ❌ TypeError: list is not hashable</span></code></div>
    <div class="memory-hook">
      <div class="mh-title">🧠 Memory Hook</div>
      <p>"<strong>Immutable = hashable = usable as a key.</strong> If you need a (row, col) pair as a dictionary key or set element, use a tuple, not a list."</p>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-header" onclick="toggleCard(this)">
    <span class="card-title">⚡ Full Cheat Sheet</span><span class="card-badge">reference</span>
  </div>
  <div class="card-body open">
    <div class="cheatsheet">
      <div class="cs-item"><div class="cs-title">Variables</div><code>n = 0 / n = "str" / n = None</code><code>a, b = 1, 2</code><code>n += 1 (not n++)</code></div>
      <div class="cs-item"><div class="cs-title">Loops</div><code>for i in range(5)</code><code>for i in range(2,6)</code><code>for i in range(5,0,-1)</code></div>
      <div class="cs-item"><div class="cs-title">Division</div><code>5/2 → 2.5 (float)</code><code>5//2 → 2 (floor)</code><code>int(-3/2) → -1 (truncate)</code></div>
      <div class="cs-item"><div class="cs-title">List</div><code>a.append(x) / a.pop()</code><code>a[1:3] / a[-1]</code><code>[0]*n / list comprehension</code></div>
      <div class="cs-item"><div class="cs-title">String</div><code>immutable — new on change</code><code>ord('a') → 97</code><code>delim.join(list)</code></div>
      <div class="cs-item"><div class="cs-title">HashMap</div><code>d = {} / d[k] = v</code><code>k in d / d.pop(k)</code><code>d.items() / d.values()</code></div>
      <div class="cs-item"><div class="cs-title">HashSet</div><code>s = {1,2,3} / s.add(x)</code><code>x in s / s.remove(x)</code><code>no duplicates</code></div>
      <div class="cs-item"><div class="cs-title">Deque</div><code>from collections import deque</code><code>q.append / q.popleft()</code><code>O(1) both ends</code></div>
      <div class="cs-item"><div class="cs-title">Heap</div><code>import heapq</code><code>heappush(h,x) / heappop(h)</code><code>max heap: push -x, pop -x</code></div>
      <div class="cs-item"><div class="cs-title">Tuples</div><code>t = (1,2) — immutable</code><code>usable as dict/set key</code><code>list key → TypeError</code></div>
      <div class="cs-item"><div class="cs-title">Enumerate/Zip</div><code>for i,v in enumerate(a)</code><code>for a,b in zip(l1,l2)</code></div>
      <div class="cs-item"><div class="cs-title">nonlocal</div><code>read outer var: free</code><code>write outer var: nonlocal x</code><code>mutate object: no keyword</code></div>
    </div>
  </div>
</div>

<div class="quiz-section" id="quiz-tuples"></div>
`,
  quiz: [
    { q: "Why can a tuple be a dictionary key but a list cannot?", opts: ["Tuples are smaller", "Tuples are immutable and therefore hashable", "Lists don't support __hash__", "Both B and C"], ans: 3, explain: "Hashability requires immutability. Lists are mutable so Python doesn't implement __hash__ for them. Tuples are immutable and hashable." },
    { q: "In BFS/DFS, what's the ideal way to store 'visited' grid cells like (row, col)?", opts: ["A list of lists", "A set of tuples: {(r,c)}", "A dict with string keys 'r,c'", "A 2D boolean array only"], ans: 1, explain: "A set of tuples gives O(1) lookup and is the cleanest way. {(r,c)} is the standard pattern for grid problems." }
  ]
}
];

let score = 0;
let answered = {};
let done = new Set();

function buildNav() {
  const nav = document.getElementById('nav');
  topics.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i===0?' active':'');
    btn.id = 'nav-'+t.id;
    btn.textContent = t.emoji + ' ' + t.short;
    btn.onclick = () => showTopic(i);
    nav.appendChild(btn);
  });
}

function showTopic(idx) {
  const t = topics[idx];
  const content = document.getElementById('content');
  content.innerHTML = `<div class="topic active">${t.content}</div>`;

  // Build quizzes
  if (t.quiz) {
    const qContainer = document.getElementById('quiz-'+t.id);
    if (qContainer) {
      qContainer.innerHTML = '<div style="margin-top:20px;margin-bottom:8px;color:#58a6ff;font-weight:700;font-size:0.9em;">🧠 Test Your Understanding</div>';
      t.quiz.forEach((q, qi) => {
        const key = t.id+'-'+qi;
        const div = document.createElement('div');
        div.className = 'quiz-q';
        const isAnswered = answered[key] !== undefined;
        div.innerHTML = `<div class="quiz-question">${qi+1}. ${q.q}</div>
          <div class="quiz-options">
            ${q.opts.map((o,oi) => {
              let cls = 'quiz-opt';
              if (isAnswered) {
                if (oi === q.ans) cls += ' correct';
                else if (oi === answered[key] && oi !== q.ans) cls += ' wrong';
              }
              return `<button class="${cls}" onclick="answer('${key}',${oi},${q.ans},'${t.id}',${qi})" ${isAnswered?'disabled':''}>${o}</button>`;
            }).join('')}
          </div>
          <div class="quiz-feedback ${isAnswered?(answered[key]===q.ans?'ok':'bad'):''} ${isAnswered?'show':''}" id="fb-${key}">
            ${isAnswered?(answered[key]===q.ans?'✅ ':'❌ ')+q.explain:''}
          </div>`;
        qContainer.appendChild(div);
      });
    }
  }

  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.className = 'nav-btn' + (done.has(topics[i].id)?' done':'') + (i===idx?' active':'');
  });

  const pct = Math.round(((idx+1)/topics.length)*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `Topic ${idx+1} of ${topics.length}`;

  // Add bottom nav
  const bnav = document.createElement('div');
  bnav.className = 'bottom-nav';
  bnav.innerHTML = `
    <button class="btn btn-secondary" onclick="showTopic(${idx-1})" ${idx===0?'disabled':''}>← Prev</button>
    <button class="btn btn-primary" onclick="showTopic(${idx+1})" ${idx===topics.length-1?'disabled':''}>Next →</button>
  `;
  document.querySelector('.topic').appendChild(bnav);

  document.querySelector('.content').scrollTop = 0;
  window.scrollTo(0,0);
}

function answer(key, chosen, correct, topicId, qi) {
  if (answered[key] !== undefined) return;
  answered[key] = chosen;

  const isRight = chosen === correct;
  if (isRight) { score += 10; document.getElementById('score-label').textContent = score+' pts'; }

  // Check if whole topic quiz done
  const t = topics.find(x=>x.id===topicId);
  const allDone = t.quiz.every((_,i) => answered[topicId+'-'+i] !== undefined);
  if (allDone) done.add(topicId);

  // Re-render
  const idx = topics.findIndex(x=>x.id===topicId);
  showTopic(idx);
  // Scroll to quiz
  setTimeout(() => {
    const fb = document.getElementById('fb-'+key);
    if (fb) fb.scrollIntoView({behavior:'smooth',block:'center'});
  }, 100);
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

buildNav();
showTopic(0);
</script>
